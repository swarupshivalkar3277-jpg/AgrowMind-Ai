  <!-- =========================================================
       PRELOADER STYLE
  ========================================================== -->

  <style>

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Inter", sans-serif;
      background: #020617;
      color: white;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    .initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left,
          rgba(34, 197, 94, 0.25),
          transparent 30%),
        radial-gradient(circle at bottom right,
          rgba(59, 130, 246, 0.25),
          transparent 30%),
        #020617;
      z-index: 9999;
    }

    .loader-ring {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.08);
      border-top-color: #22c55e;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      margin-top: 20px;
      font-size: 1rem;
      color: #cbd5e1;
      letter-spacing: 0.05em;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

  </style>

</head>

<body>

  <!-- =========================================================
       REACT ROOT
  ========================================================== -->

  <div id="root">

    <!-- INITIAL LOADER -->

    <div class="initial-loader">

      <div class="loader-ring"></div>

      <div class="loader-text">
        Loading AgroMind AI...
      </div>

    </div>

  </div>

  <!-- =========================================================
       VITE ENTRY
  ========================================================== -->

  <script
    type="module"
    src="/src/main.jsx"
  ></script>

</body>
