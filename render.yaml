services:
  - type: web
    name: agromind-ai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: agromind_ai
      - key: MONGO_DNS_NAMESERVERS
        value: 1.1.1.1,8.8.8.8
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://agromindai.in
      - key: ALLOWED_ORIGINS
        value: https://agrowmindai.vercel.app,https://agromindai.in,https://www.agromindai.in
      - key: TRUSTED_HOSTS
        value: agromind-ai-api.onrender.com,*.onrender.com,localhost,127.0.0.1
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_REGISTER_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://agrowmind-ai.onrender.com/auth/google/callback
      - key: MODEL_DIRS
        sync: false
      - key: MODEL_BASE_URL
        sync: false
      - key: TOMATO_MODEL_URL
        sync: false
      - key: MANGO_MODEL_URL
        sync: false
      - key: COCONUT_MODEL_URL
        sync: false
