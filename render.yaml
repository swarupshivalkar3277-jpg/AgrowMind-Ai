services:
  - type: web
    name: agromind-ai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: JWT_SECRET_KEY
        sync: false
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: agromind_ai
      - key: MONGO_DNS_NAMESERVERS
        value: 1.1.1.1,8.8.8.8
      - key: FRONTEND_ORIGIN
        value: https://agrowmindai.vercel.app
      - key: CORS_ORIGINS
        value: https://agrowmindai.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://agromind-ai-api.onrender.com/auth/google/callback
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: MODEL_DIRS
        sync: false
      - key: MODEL_BASE_URL
        sync: false
      - key: TOMATO_MODEL_URL
        sync: false
      - key: MANGO_MODEL_URL
        sync: false
      - key: COCONUT_MODEL_URL
        sync: false
