services:
  - type: web
    name: agromind-ai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install --no-cache-dir --prefer-binary -r requirements.txt && python -m pip check && python scripts/download_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 20 --limit-concurrency 8
    healthCheckPath: /ready
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: agromind_ai
      - key: MONGO_DNS_NAMESERVERS
        value: 1.1.1.1,8.8.8.8
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CUDA_VISIBLE_DEVICES
        value: "-1"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: TF_INTER_OP_THREADS
        value: "1"
      - key: TF_INTRA_OP_THREADS
        value: "1"
      - key: PRELOAD_MODELS_ON_STARTUP
        value: "true"
      - key: REQUIRE_MODELS_ON_STARTUP
        value: "false"
      - key: MODEL_PRELOAD_TIMEOUT_SECONDS
        value: "240"
      - key: MAX_LOADED_MODELS
        value: "3"
      - key: UNLOAD_MODEL_AFTER_PREDICTION
        value: "false"
      - key: TOMATO_MODEL_URL
        sync: false
      - key: MANGO_MODEL_URL
        sync: false
      - key: COCONUT_MODEL_URL
        sync: false
      - key: MODEL_DOWNLOAD_MAX_ATTEMPTS
        value: "3"
      - key: MODEL_DOWNLOAD_TIMEOUT_SECONDS
        value: "120"
      - key: PREDICTION_CONCURRENCY
        value: "1"
      - key: PREDICTION_TIMEOUT_SECONDS
        value: "150"
      - key: RAG_CONCURRENCY
        value: "1"
      - key: RAG_TOTAL_TIMEOUT_SECONDS
        value: "15"
      - key: RAG_RETRIEVAL_TIMEOUT_SECONDS
        value: "5"
      - key: RAG_GENERATION_TIMEOUT_SECONDS
        value: "10"
      - key: RAG_UNLOAD_EMBEDDER_AFTER_QUERY
        value: "false"
      - key: PRELOAD_RAG_ON_STARTUP
        value: "true"
      - key: RAG_WARMUP_TIMEOUT_SECONDS
        value: "120"
      - key: FRONTEND_URL
        value: https://agromindai.in
      - key: ALLOWED_ORIGINS
        value: https://agrowmindai.vercel.app,https://agromind.in,https://www.agromind.in,https://agromindai.in,https://www.agromindai.in
      - key: TRUSTED_HOSTS
        value: agromind-ai-api.onrender.com,*.onrender.com,localhost,127.0.0.1
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_REGISTER_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://agromind-ai-api.onrender.com/auth/google/callback
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RAG_LLM_PROVIDER
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: RAG_KNOWLEDGE_BASE_DIR
        value: knowledge_base
      - key: RAG_VECTOR_DB_PATH
        value: vector_db
      - key: RAG_COLLECTION_NAME
        value: agromind_knowledge
      - key: RAG_EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: MODEL_DIRS
        value: models:training
